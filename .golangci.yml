version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gosec
    - bodyclose
    - contextcheck
    - noctx
    - exhaustive
    - godot
    - staticcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/dawsonalex/service-example

linters-settings:
  godot:
    scope: declarations
  revive:
    rules:
      - name: exported
      - name: var-naming
      - name: package-comments
      - name: error-return
      - name: error-naming
      - name: if-return
      - name: increment-decrement

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
